apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: apps-repo
  namespace: flux-system
spec:
  interval: 1m
  url: https://github.com/abhijit-m7/Kosmotron
  ref:
    branch: main
  secretRef:
    name: github-token
---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: apps
  namespace: flux-system
spec:
  interval: 10m
  path: ./applications/releases
  prune: true
  sourceRef:
    kind: GitRepository
    name: apps-repo
  targetNamespace: default
  kubeConfig:
    secretRef:
      name: workload-1-kubeconfig
