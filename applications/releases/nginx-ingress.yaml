apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
spec:
  interval: 1h
  chart:
    spec:
      chart: nginx-ingress-controller
      version: "4.11.0"
      sourceRef:
        kind: HelmRepository
        name: nginx-stable
        namespace: flux-system
  values:
    controller:
      service:
        type: ClusterIP
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
