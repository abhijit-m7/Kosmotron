apiVersion: source.toolkit.fluxcd.io/v1
kind: HelmRepository
metadata:
  name: nginx-stable
  namespace: flux-system
spec:
  interval: 1h
  url: https://helm.nginx.com/stable
---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: nginx-ingress
  namespace: default
spec:
  interval: 1h
  chart:
    spec:
      chart: nginx-ingress-controller
      version: "4.11.0"
      sourceRef:
        kind: HelmRepository
        name: nginx-stable
  targetNamespace: ingress-nginx
  install:
    createNamespace: true
